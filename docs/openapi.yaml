openapi: 3.0.0
info:
  title: Budgeting Web App API
  description: API documentation for the Budgeting Web Application
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Development server

security:
  - bearerAuth: []

paths:
  /api/auth/register:
    post:
      summary: Register a new user
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - name
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  minLength: 6
                  example: password123
                name:
                  type: string
                  example: John Doe
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              example:
                message: User registered successfully
        '400':
          description: Invalid input or user already exists
        '500':
          description: Server error

  /api/auth/[...nextauth]:
    post:
      summary: User login
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          headers:
            Set-Cookie:
              schema:
                type: string
                example: next-auth.session-token=...
        '401':
          description: Invalid credentials

  /api/auth/signout:
    post:
      summary: User logout
      tags:
        - Authentication
      responses:
        '200':
          description: Logout successful

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Transaction:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        type:
          type: string
          enum: [income, expense]
        amount:
          type: number
        description:
          type: string
        category:
          type: string
        date:
          type: string
          format: date-time

    Budget:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        category:
          type: string
        month:
          type: string
          pattern: '^\d{4}-(0[1-9]|1[0-2])$'
        amount:
          type: number

    SavingsGoal:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        name:
          type: string
        targetAmount:
          type: number
        currentAmount:
          type: number
        deadline:
          type: string
          format: date-time
        completed:
          type: boolean

    Error:
      type: object
      properties:
        error:
          type: string
